<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data visualisation · refined</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
    background: #a7cfef;
    margin: 0;
    padding: 0;
    font-family: "Lexend", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
.container { flex: 1; display: flex; flex-direction: column; }
.headline {
    font-family: "Pacifico";
    font-size: clamp(20pt, 5vw, 30pt);
    font-weight: 700;
    text-align: center;
    color: #5792f2;
    margin-top: clamp(20px, 5vh, 40px);
    margin-bottom: 20px;
    padding: 0 16px;
}
.line { border: none; height: 2px; background: rgba(0,0,0,0.2); width: 90%; margin: 20px auto; }
.buttons-row { display: flex; justify-content: center; margin: 20px 16px 10px; }
.pill-container {
    position: relative; display: flex; gap: 4px; padding: 6px;
    border-radius: 999px; background: #5792f2;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-width: 100%; flex-wrap: nowrap;
}
.pill-container button, .pill-container .info-tab {
    position: relative; background: none; border: none;
    padding: 10px 18px; font-size: clamp(13px, 3vw, 16px);
    border-radius: 999px; cursor: pointer; z-index: 2; color: white;
    font-family: "Lexend", sans-serif; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; white-space: nowrap;
}
.pill-container .info-tab {
    padding: 10px 16px; font-weight: 600;
    font-size: clamp(15px, 4vw, 20px); flex-shrink: 0;
}
.pill-container button.active { font-weight: 600; letter-spacing: 0.5px; }
.selector {
    position: absolute; top: 50%; transform: translateY(-50%);
    left: 6px; height: calc(100% - 12px);
    background: rgba(255,255,255,0.35); backdrop-filter: blur(10px);
    border-radius: 999px;
    transition: left 0.35s cubic-bezier(.25,.8,.25,1), width 0.35s cubic-bezier(.25,.8,.25,1);
    box-shadow: 0 6px 18px rgba(0,0,0,0.2); z-index: 1;
    border: 1px solid rgba(255,255,255,0.3); pointer-events: none; opacity: 0;
}
.selector.ready { opacity: 1; transition: left 0.35s cubic-bezier(.25,.8,.25,1), width 0.35s cubic-bezier(.25,.8,.25,1), opacity 0.2s; }
.info-panel-wrapper {
    overflow: hidden; height: 0; opacity: 0;
    width: min(68%, 595px); margin: 0 auto;
    border-radius: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); will-change: height;
}
.info-panel-wrapper.animating { transition: height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease; }
.info-panel-wrapper.visible { opacity: 1; }
.info-panel {
    width: 100%; background: rgba(255,255,255,0.35);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 40px; padding: clamp(14px, 3vw, 20px) clamp(16px, 4vw, 28px);
    border: 1px solid rgba(255,255,255,0.4); color: #1e2b3c; position: relative;
}
.info-panel h4 {
    margin: 0 0 8px 0; font-family: "Lexend", sans-serif; font-weight: 600;
    font-size: clamp(15px, 3vw, 18px); color: #0f2a44;
    border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; padding-right: 36px;
}
.info-panel p { margin: 8px 0; font-size: clamp(13px, 2.5vw, 15px); line-height: 1.5; }
.info-panel .format-example {
    background: rgba(255,255,255,0.3); border-radius: 24px; padding: 10px 14px;
    font-family: monospace; font-size: clamp(11px, 2vw, 14px); margin-top: 12px;
    border: 1px solid rgba(255,255,255,0.4); color: #1d3557;
    word-break: break-word; white-space: pre-wrap; backdrop-filter: blur(4px);
}
.close-info {
    position: absolute; top: 12px; right: 14px;
    background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.4);
    font-size: 22px; cursor: pointer; color: #2c3e50;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(5px); transition: background 0.2s, transform 0.2s; flex-shrink: 0;
}
.close-info:hover { background: rgba(255,255,255,0.5); transform: scale(1.1); }
.upload-section { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 16px; }
.upload-box {
    width: min(80%, 700px); height: clamp(180px, 28vh, 280px); margin: 20px auto;
    background: rgba(255,255,255,0.3); border-radius: 30px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 16px; text-align: center;
    user-select: none;
}
.upload-box:hover { background: rgba(255,255,255,0.4); box-shadow: 0 15px 35px rgba(0,0,0,0.2); transform: translateY(-5px); }
.upload-box.drag-over { background: rgba(255,255,255,0.5); border-color: rgba(87,146,242,0.7); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(87,146,242,0.3); }
@keyframes successFlash {
    0%   { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.3); }
    20%  { background: rgba(200,240,200,0.4); border-color: rgba(76,175,80,0.6); }
    100% { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.3); }
}
@keyframes errorFlash {
    0%   { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.3); }
    20%  { background: rgba(255,200,200,0.4); border-color: rgba(244,67,54,0.6); }
    100% { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.3); }
}
.upload-box.success-flash { animation: successFlash 1.2s ease-out forwards; }
.upload-box.error-flash   { animation: errorFlash 1.2s ease-out forwards; }
.upload-box .icon {
    font-family: "Lilita One", sans-serif; font-style: normal;
    font-size: clamp(40px, 8vw, 60px); line-height: 1; margin-bottom: 12px;
    transition: transform 0.4s cubic-bezier(0.25,0.8,0.25,1), color 0.4s;
    pointer-events: none;
}
.upload-box .icon.default  { color: #5792f2; }
.upload-box:hover .icon.default { transform: scale(1.15) translateY(-10px); }
.upload-box .icon.checkmark { color: #4CAF50; animation: iconAppear 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
.upload-box .icon.xmark     { color: #F44336; animation: iconAppear 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes iconAppear {
    0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg);   opacity: 1; }
}
@keyframes slideUp {
    0%   { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
}
@keyframes slideDown {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(30px); }
}
.upload-text {
    margin-top: 4px; font-size: clamp(14px, 3vw, 18px); color: #333; font-weight: 500;
    transition: opacity 0.25s, transform 0.25s, color 0.3s;
    word-break: break-all; max-width: 90%; pointer-events: none;
}
.upload-text.filename  { color: #1c1c1c !important; }
.upload-text.fade-out  { opacity: 0; transform: translateY(-8px); }
.sub-text { font-size: clamp(11px, 2.5vw, 14px); opacity: 0.6; margin-top: 5px; transition: color 0.3s, opacity 0.3s; pointer-events: none; }
input[type=file] { display: none; }
.create-btn-container {
    width: min(80%, 700px); margin: 6px auto 30px;
    display: flex; justify-content: center;
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.5s ease, transform 0.5s ease; pointer-events: none;
}
.create-btn-container.show {
    opacity: 1; transform: translateY(0); pointer-events: auto;
    animation: slideUp 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
.create-btn-container.hide { animation: slideDown 0.3s ease forwards; }
.create-btn {
    background: #5792f2; color: white; border: 1px solid rgba(255,255,255,0.3);
    padding: clamp(12px, 2.5vw, 16px) clamp(28px, 6vw, 48px);
    font-size: clamp(15px, 3.5vw, 20px); font-weight: 600; border-radius: 50px;
    cursor: pointer; font-family: "Lexend", sans-serif; letter-spacing: 1px;
    box-shadow: 0 15px 30px rgba(87,146,242,0.35);
    transition: all 0.9s cubic-bezier(0.25,0.1,0.15,1);
    backdrop-filter: blur(5px); position: relative; overflow: hidden; z-index: 1;
}
.create-btn::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0.5) 45%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0.5) 55%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0) 100%);
    transform: rotate(20deg) translateY(-40%) translateX(-30%);
    transition: transform 2.2s cubic-bezier(0.19,1,0.22,1); z-index: -1; opacity: 0; pointer-events: none;
}
.create-btn::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
    opacity: 0; transition: opacity 1.4s ease; z-index: -1; pointer-events: none;
}
.create-btn:hover {
    background: rgba(87,146,242,0.45);
    text-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 0 20px rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.95);
    box-shadow: 0 30px 45px rgba(87,146,242,0.4), inset 0 -8px 20px rgba(255,255,255,0.6), inset 0 8px 20px rgba(255,255,255,0.6), 0 0 0 2px rgba(255,255,255,0.3);
    transform: scale(1.08) translateY(-6px); backdrop-filter: blur(15px);
    transition: all 1.2s cubic-bezier(0.22,1,0.36,1);
}
.create-btn:hover::before { transform: rotate(20deg) translateY(80%) translateX(80%); opacity: 1; transition: transform 2.8s cubic-bezier(0.25,1,0.3,1), opacity 1s ease; }
.create-btn:hover::after { opacity: 1; background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 40%, rgba(255,255,255,0) 80%); transition: opacity 1.2s ease, background 1.5s ease; }
.create-btn:active { transform: translateY(3px) scale(0.97); box-shadow: 0 10px 20px rgba(87,146,242,0.3), inset 0 -3px 10px rgba(255,255,255,0.3); transition: transform 0.2s ease, box-shadow 0.3s ease; }
.create-btn:focus { outline: none; }
.loading-overlay {
    position: fixed; inset: 0; background: #a7cfef;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.loader { display: flex; gap: 15px; }
.loader span { width: 20px; height: 20px; background: #5792f2; border-radius: 50%; animation: pulse 0.6s infinite ease-in-out; }
.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
    0%,80%,100% { transform: scale(0); opacity: 0.3; }
    40%          { transform: scale(1); opacity: 1; }
}
@media (max-width: 768px) {
    .upload-box { width: 90%; }
    .create-btn-container { width: 90%; }
    .info-panel-wrapper { width: min(76.5%, 595px); }
}
@media (max-width: 480px) {
    .pill-container { gap: 2px; padding: 5px; }
    .pill-container button, .pill-container .info-tab { padding: 9px 13px; }
    .upload-box { width: 95%; border-radius: 20px; }
    .create-btn-container { width: 95%; }
    .info-panel-wrapper { width: 80.75%; border-radius: 28px; }
    .info-panel { border-radius: 28px; }
}
</style>
</head>
<body>
<div class="container" id="mainContainer">
    <h1 class="headline">Data visualisation</h1>
    <hr class="line">

    <div class="buttons-row">
        <div class="pill-container" id="pillContainer">
            <div class="selector" id="selector"></div>
            <button class="active">JSON</button>
            <button>CSV</button>
            <button>XML</button>
            <div class="info-tab" id="infoTab" role="button" aria-label="Show format info" tabindex="0">i</div>
        </div>
    </div>

    <div class="info-panel-wrapper" id="infoPanelWrapper">
        <div class="info-panel" id="infoPanel">
            <button class="close-info" id="closeInfoBtn" aria-label="Close">&times;</button>
            <h4 id="infoTitle">JSON format</h4>
            <p id="infoDesc">Hierarchical key‑value data. Usually an array of objects with x, y, z fields.</p>
            <div class="format-example" id="infoExample">[ {"x": 10, "y": 20, "z": 30}, {"x": 15, "y": 18, "z": 25} ]</div>
        </div>
    </div>

    <div class="upload-section" id="uploadSection">
        <div class="upload-box" id="uploadBox" role="button" tabindex="0" aria-label="Upload file">
            <div class="icon default" id="uploadIcon">+</div>
            <div class="upload-text" id="uploadText">Upload your JSON file</div>
            <div class="sub-text" id="subText">Drag & Drop or Click to Upload</div>
            <input type="file" id="fileInput" accept=".json,application/json">
        </div>
        <div class="create-btn-container" id="createBtnContainer">
            <button class="create-btn" id="createBtn">Create Visualisation</button>
        </div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loader"><span></span><span></span><span></span></div>
</div>

<script>
const buttons            = document.querySelectorAll(".pill-container button");
const selector           = document.getElementById("selector");
const infoTab            = document.getElementById("infoTab");
const infoPanelWrapper   = document.getElementById("infoPanelWrapper");
const closeInfoBtn       = document.getElementById("closeInfoBtn");
const uploadBox          = document.getElementById("uploadBox");
const fileInput          = document.getElementById("fileInput");
const uploadText         = document.getElementById("uploadText");
const subText            = document.getElementById("subText");
const uploadIcon         = document.getElementById("uploadIcon");
const createBtnContainer = document.getElementById("createBtnContainer");
const createBtn          = document.getElementById("createBtn");
const infoTitle          = document.getElementById("infoTitle");
const infoDesc           = document.getElementById("infoDesc");
const infoExample        = document.getElementById("infoExample");

let currentFileType = "json";
let currentFile     = null;
let infoVisible     = false;
let panelAnimLock   = false;

// ── Panel animation ──────────────────────────────────────────────────────────
function afterTransition(el, cb, timeout = 450) {
    let done = false;
    const guard = () => { if (done) return; done = true; cb(); };
    const handler = (e) => {
        if (e.target !== el) return;
        el.removeEventListener('transitionend', handler);
        guard();
    };
    el.addEventListener('transitionend', handler);
    setTimeout(guard, timeout);
}

function showInfoPanel() {
    if (infoVisible || panelAnimLock) return;
    panelAnimLock = true;
    infoPanelWrapper.style.height = 'auto';
    const target = infoPanelWrapper.scrollHeight;
    infoPanelWrapper.style.height = '0px';
    infoPanelWrapper.classList.add('visible');
    infoPanelWrapper.offsetHeight;
    infoPanelWrapper.classList.add('animating');
    infoPanelWrapper.style.height = target + 'px';
    afterTransition(infoPanelWrapper, () => {
        infoPanelWrapper.style.height = 'auto';
        infoPanelWrapper.classList.remove('animating');
        infoVisible = true;
        panelAnimLock = false;
    });
}

function hideInfoPanel() {
    if (!infoVisible || panelAnimLock) return;
    panelAnimLock = true;
    const current = infoPanelWrapper.offsetHeight;
    infoPanelWrapper.classList.add('animating');
    infoPanelWrapper.style.height = current + 'px';
    infoPanelWrapper.offsetHeight;
    infoPanelWrapper.style.height = '0px';
    afterTransition(infoPanelWrapper, () => {
        infoPanelWrapper.classList.remove('visible', 'animating');
        infoVisible = false;
        panelAnimLock = false;
    });
}

function updateInfoContent(type) {
    const map = {
        json: { title: "JSON format", desc: "Hierarchical key‑value data. Usually an array of objects with x, y, z fields.", ex: '[ {"x": 10, "y": 20, "z": 30},\n  {"x": 15, "y": 18, "z": 25} ]' },
        csv:  { title: "CSV format",  desc: "Comma‑separated values. First row headers, then rows with x, y, z numbers.", ex: 'x,y,z\n10,20,30\n15,18,25\n22,27,33' },
        xml:  { title: "XML format",  desc: 'Nested elements with attributes. Often <point x="..." y="..." z="..." />.', ex: '<points>\n  <point x="10" y="20" z="30"/>\n  <point x="15" y="18" z="25"/>\n</points>' }
    };
    const c = map[type];
    infoTitle.textContent   = c.title;
    infoDesc.textContent    = c.desc;
    infoExample.textContent = c.ex;
    if (infoVisible && !panelAnimLock) {
        panelAnimLock = true;
        infoPanelWrapper.style.height = 'auto';
        const target = infoPanelWrapper.scrollHeight;
        infoPanelWrapper.style.height = target + 'px';
        setTimeout(() => { infoPanelWrapper.style.height = 'auto'; panelAnimLock = false; }, 50);
    }
}

// ── Selector ─────────────────────────────────────────────────────────────────
function positionSelector(btn, animate) {
    if (!animate) selector.classList.remove('ready');
    selector.style.width = btn.offsetWidth + 'px';
    selector.style.left  = btn.offsetLeft  + 'px';
    if (!animate) {
        requestAnimationFrame(() => requestAnimationFrame(() => selector.classList.add('ready')));
    }
}

function activateTab(btn) {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    positionSelector(btn, true);
    const type = btn.textContent.trim().toLowerCase();
    currentFileType = type;
    fileInput.accept = { json: '.json,application/json', csv: '.csv,text/csv', xml: '.xml,text/xml,application/xml' }[type];
    animateText(uploadText, `Upload your ${type.toUpperCase()} file`);
    updateInfoContent(type);
    // Full reset when switching tabs
    resetBox();
    hideCreateButton();
    currentFile = null;
    // Replace file input to clear it reliably without triggering change event
    replaceFileInput();
}

// ── Replace file input (avoids stale-value / no-change-event bug) ────────────
function replaceFileInput() {
    const old = document.getElementById('fileInput');
    const fresh = old.cloneNode(false); // clone without event listeners
    fresh.accept = fileInput ? fileInput.accept : old.accept;
    old.parentNode.replaceChild(fresh, old);
    // Re-bind the change listener on the new input
    fresh.addEventListener('change', onFileInputChange);
    // Update our reference — we use getElementById so always fresh
}

function onFileInputChange(e) {
    const file = e.target.files[0];
    if (file) handleFile(file);
}

// ── Text transition ───────────────────────────────────────────────────────────
function animateText(el, newText) {
    el.classList.add('fade-out');
    setTimeout(() => { el.textContent = newText; el.classList.remove('fade-out'); }, 220);
}

// ── Upload box states ─────────────────────────────────────────────────────────
let errorResetTimer = null;

function resetBox() {
    if (errorResetTimer) { clearTimeout(errorResetTimer); errorResetTimer = null; }
    uploadIcon.className = 'icon default';
    uploadIcon.textContent = '+';
    uploadBox.classList.remove('success-flash', 'error-flash', 'drag-over');
    uploadText.style.color = '';
    uploadText.classList.remove('filename');
    uploadText.textContent = `Upload your ${currentFileType.toUpperCase()} file`;
    subText.textContent = 'Drag & Drop or Click to Upload';
    subText.style.color = '';
    subText.style.opacity = '';
}

function showSuccess(file) {
    if (errorResetTimer) { clearTimeout(errorResetTimer); errorResetTimer = null; }
    currentFile = file;
    uploadIcon.className = 'icon checkmark';
    uploadIcon.textContent = '✓';
    uploadBox.classList.remove('error-flash', 'drag-over');
    void uploadBox.offsetWidth;
    uploadBox.classList.add('success-flash');
    animateText(uploadText, file.name);
    uploadText.style.color = '#1c1c1c';
    uploadText.classList.add('filename');
    subText.textContent = '✓ File ready for visualisation';
    subText.style.color = '#2e7d32';
    subText.style.opacity = '1';
    showCreateButton();
    setTimeout(() => uploadBox.classList.remove('success-flash'), 1200);
}

function showError(file) {
    currentFile = null;
    uploadIcon.className = 'icon xmark';
    uploadIcon.textContent = '✕';
    uploadBox.classList.remove('success-flash', 'drag-over');
    void uploadBox.offsetWidth;
    uploadBox.classList.add('error-flash');
    uploadText.style.color = '#c62828';
    uploadText.classList.remove('filename');
    uploadText.textContent = `Upload your ${currentFileType.toUpperCase()} file`;
    subText.textContent = `✕ Invalid file. Please select a ${currentFileType.toUpperCase()} file`;
    subText.style.color = '#c62828';
    subText.style.opacity = '1';
    hideCreateButton();
    // After error reset, also replace file input so same file can be re-selected
    errorResetTimer = setTimeout(() => {
        resetBox();
        uploadBox.classList.remove('error-flash');
        replaceFileInput();
        errorResetTimer = null;
    }, 3000);
}

// ── Create button ─────────────────────────────────────────────────────────────
function showCreateButton() {
    createBtnContainer.style.display = 'flex';
    void createBtnContainer.offsetWidth;
    createBtnContainer.classList.remove('hide');
    createBtnContainer.classList.add('show');
}

function hideCreateButton() {
    if (!createBtnContainer.classList.contains('show')) {
        createBtnContainer.style.display = 'none';
        return;
    }
    createBtnContainer.classList.remove('show');
    createBtnContainer.classList.add('hide');
    setTimeout(() => { createBtnContainer.style.display = 'none'; createBtnContainer.classList.remove('hide'); }, 320);
}

// ── File validation ───────────────────────────────────────────────────────────
const typeMap = {
    json: ['.json', 'application/json'],
    csv:  ['.csv',  'text/csv'],
    xml:  ['.xml',  'text/xml', 'application/xml']
};

function isValid(file) {
    if (!file) return false;
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    const allowed = typeMap[currentFileType];
    return allowed.some(t => ext === t || file.type === t || file.type.includes(currentFileType));
}

function handleFile(file) {
    if (!file) return;
    if (isValid(file)) showSuccess(file);
    else showError(file);
}

// ── Click to open file picker ─────────────────────────────────────────────────
uploadBox.addEventListener('click', (e) => {
    // Don't trigger if clicking a child that handles its own events
    const inp = document.getElementById('fileInput');
    inp.click();
});

uploadBox.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        document.getElementById('fileInput').click();
    }
});

// ── Drag and drop — robust version ───────────────────────────────────────────
// Use a counter to handle child element dragenter/dragleave correctly
let dragCounter = 0;

uploadBox.addEventListener('dragenter', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragCounter++;
    uploadBox.classList.add('drag-over');
});

uploadBox.addEventListener('dragleave', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragCounter--;
    if (dragCounter <= 0) {
        dragCounter = 0;
        uploadBox.classList.remove('drag-over');
    }
});

uploadBox.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'copy';
});

uploadBox.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragCounter = 0;
    uploadBox.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
});

// Also prevent browser from opening files dropped outside the box
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop',     e => e.preventDefault());

// ── Info panel events ─────────────────────────────────────────────────────────
infoTab.addEventListener('click', e => { e.stopPropagation(); infoVisible ? hideInfoPanel() : showInfoPanel(); });
infoTab.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); infoTab.click(); } });
closeInfoBtn.addEventListener('click', e => { e.stopPropagation(); hideInfoPanel(); });
document.addEventListener('click', e => {
    if (infoVisible && !infoPanelWrapper.contains(e.target) && !infoTab.contains(e.target)) hideInfoPanel();
});

// ── Tab buttons ───────────────────────────────────────────────────────────────
buttons.forEach(btn => btn.addEventListener('click', () => activateTab(btn)));

// ── Create button ─────────────────────────────────────────────────────────────
createBtn.addEventListener('click', () => {
    if (!currentFile) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        sessionStorage.setItem("uploadedFile", JSON.stringify({
            name: currentFile.name,
            type: currentFile.type,
            data: e.target.result,
            format: currentFileType
        }));
        const overlay = document.getElementById('loadingOverlay');
        document.querySelector('.container').style.display = 'none';
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'auto';
        setTimeout(() => { window.location.href = "vis.html"; }, 1200);
    };
    reader.readAsText(currentFile);
});

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    infoPanelWrapper.style.height = '0px';
    createBtnContainer.style.display = 'none';
    updateInfoContent('json');
    // Bind initial file input
    document.getElementById('fileInput').addEventListener('change', onFileInputChange);
    requestAnimationFrame(() => requestAnimationFrame(() => positionSelector(buttons[0], false)));
});

let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        const active = document.querySelector('.pill-container button.active') || buttons[0];
        positionSelector(active, false);
        if (infoVisible) infoPanelWrapper.style.height = 'auto';
    }, 100);
});
</script>
</body>
</html>
